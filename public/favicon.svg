<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ringGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB36B"/>
      <stop offset="60%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="18" fill="#101722"/>
  <g filter="url(#glow)">
    <circle cx="32" cy="32" r="20" stroke="url(#ringGradient)" stroke-width="4" fill="none" opacity="0.28"/>
    <circle cx="32" cy="32" r="15" stroke="url(#ringGradient)" stroke-width="4" fill="none"/>
  </g>
</svg>
