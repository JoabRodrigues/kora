<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ringGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB36B"/>
      <stop offset="60%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="#E0E0E0" font-family="Inter, Poppins, Montserrat, sans-serif" font-size="64" font-weight="500" letter-spacing="6">
    <text x="74" y="90">K</text>
    <text x="240" y="90">R</text>
    <text x="310" y="90">A</text>
  </g>

  <g filter="url(#glow)">
    <circle cx="180" cy="75" r="38" stroke="url(#ringGradient)" stroke-width="6" fill="none" opacity="0.25"/>
    <circle cx="180" cy="75" r="30" stroke="url(#ringGradient)" stroke-width="6" fill="none"/>
  </g>
</svg>
